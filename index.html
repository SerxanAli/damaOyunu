<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Damma - Azeri Rules</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 255, 255, 0.05) 0%, transparent 80%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            padding: 10px;
            color: #fff;
        }

        .game-container {
            background: rgba(20, 20, 20, 0.9);
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.15);
            border: 2px solid #00ffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .board-wrapper {
            width: min(88vw, 88vh, 520px);
            height: min(88vw, 88vh, 520px);
            background: #151515; /* Bir az daha açıq fon */
            border-radius: 8px;
            padding: 8px;
            border: 2px solid #ff00ff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.2);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            width: 100%;
            height: 100%;
            background-color: #1a1a1a; /* Xanaların fonu */
        }

        .square {
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            cursor: pointer;
            transition: background 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* Xanaları daha görünən etdik */
        .square.dark { background-color: #252525; }
        .square.light { background-color: #333333; }

        .piece {
            width: 82%;
            height: 82%;
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.5rem;
            z-index: 2;
        }

        .piece.player {
            background: rgba(0, 255, 255, 0.2);
            border: 3px solid #00ffff;
            box-shadow: 0 0 15px #00ffff, inset 0 0 8px #00ffff;
            color: #00ffff;
        }

        .piece.bot {
            background: rgba(255, 0, 255, 0.2);
            border: 3px solid #ff00ff;
            box-shadow: 0 0 15px #ff00ff, inset 0 0 8px #ff00ff;
            color: #ff00ff;
        }

        /* Damma (King) - Böyük Ulduz */
        .piece.king::after {
            content: '★';
            font-size: 1.8rem;
            filter: drop-shadow(0 0 5px currentColor);
        }

        .square.selected {
            background: rgba(0, 255, 255, 0.4) !important;
            box-shadow: inset 0 0 20px #00ffff;
        }

        .square.highlight {
            background: rgba(255, 255, 0, 0.2) !important;
            box-shadow: inset 0 0 15px #ffff00;
        }

        .info-panel {
            margin-top: 20px;
            width: 100%;
            text-align: center;
        }

        .status {
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #00ffff;
            background: rgba(0, 255, 255, 0.1);
            color: #00ffff;
            text-shadow: 0 0 5px #00ffff;
            margin-bottom: 15px;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            background: transparent;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            border: 1px solid #ff00ff;
            color: #ff00ff;
            transition: 0.3s;
        }

        .btn:hover { background: rgba(255, 0, 255, 0.1); box-shadow: 0 0 10px #ff00ff; }
        .btn-reset { border-color: #ffff00; color: #ffff00; }
        .btn-reset:hover { background: #ffff00; color: #000; }

        @media (max-width: 500px) {
            .board-wrapper { width: 92vw; height: 92vw; }
            .btn { padding: 8px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="board-wrapper">
        <div id="board" class="board"></div>
    </div>

    <div class="info-panel">
        <div id="status" class="status">SİZİN NÖVBƏNİZ</div>
        <div class="controls">
            <button class="btn btn-reset" onclick="initGame()">♻️ YENİ OYUN</button>
        </div>
    </div>
</div>

<script>
    let board = [];
    let turn = 'player';
    let selectedSquare = null;
    let possibleMoves = [];

    function initGame() {
        board = Array(8).fill().map(() => Array(8).fill(null));
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                if ((r + c) % 2 !== 0) {
                    if (r < 3) board[r][c] = { type: 'normal', color: 'bot' };
                    if (r > 4) board[r][c] = { type: 'normal', color: 'player' };
                }
            }
        }
        turn = 'player';
        selectedSquare = null;
        possibleMoves = [];
        updateStatus("SİZİN NÖVBƏNİZ");
        render();
    }

    function render() {
        const boardEl = document.getElementById('board');
        boardEl.innerHTML = '';
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                const sq = document.createElement('div');
                sq.className = `square ${(r + c) % 2 !== 0 ? 'dark' : 'light'}`;
                
                if (selectedSquare && selectedSquare.r === r && selectedSquare.c === c) sq.classList.add('selected');
                if (possibleMoves.some(m => m.r === r && m.c === c)) sq.classList.add('highlight');

                const p = board[r][c];
                if (p) {
                    const pieceEl = document.createElement('div');
                    pieceEl.className = `piece ${p.color} ${p.type === 'king' ? 'king' : ''}`;
                    sq.appendChild(pieceEl);
                }

                sq.onclick = () => handleSquareClick(r, c);
                boardEl.appendChild(sq);
            }
        }
    }

    function handleSquareClick(r, c) {
        if (turn !== 'player') return;
        const move = possibleMoves.find(m => m.r === r && m.c === c);
        if (move) {
            executeMove(selectedSquare.r, selectedSquare.c, r, c, move.captured);
            return;
        }
        if (board[r][c] && board[r][c].color === 'player') {
            selectedSquare = { r, c };
            possibleMoves = getValidMoves(r, c);
            render();
        }
    }

    function getValidMoves(r, c, forceCaptureOnly = false) {
        const piece = board[r][c];
        const moves = [];
        const directions = [[-1, -1], [-1, 1], [1, -1], [1, 1]];

        if (piece.type === 'king') {
            // DAMMA QAYDASI: İstədiyi qədər uzağa gedir
            directions.forEach(([dr, dc]) => {
                let nr = r + dr;
                let nc = c + dc;
                let foundEnemy = false;
                let enemyPos = null;

                while (nr >= 0 && nr < 8 && nc >= 0 && nc < 8) {
                    const target = board[nr][nc];
                    if (!foundEnemy) {
                        if (!target) {
                            if (!forceCaptureOnly) moves.push({ r: nr, c: nc });
                        } else if (target.color !== piece.color) {
                            foundEnemy = true;
                            enemyPos = { r: nr, c: nc };
                        } else break;
                    } else {
                        if (!target) {
                            moves.push({ r: nr, c: nc, captured: enemyPos });
                        } else break;
                    }
                    nr += dr;
                    nc += dc;
                }
            });
        } else {
            // Normal daş: Yalnız önə (və ya vuranda hər tərəfə)
            directions.forEach(([dr, dc]) => {
                const nr = r + dr, nc = c + dc;
                const jr = r + 2 * dr, jc = c + 2 * dc;
                
                // Vurma yoxlanışı (Hər tərəfə)
                if (jr >= 0 && jr < 8 && jc >= 0 && jc < 8) {
                    const target = board[nr][nc];
                    if (target && target.color !== piece.color && !board[jr][jc]) {
                        moves.push({ r: jr, c: jc, captured: { r: nr, c: nc } });
                    }
                }
                // Sadə gediş (Yalnız önə)
                if (!forceCaptureOnly) {
                    const isForward = piece.color === 'player' ? dr < 0 : dr > 0;
                    if (isForward && nr >= 0 && nr < 8 && nc >= 0 && nc < 8 && !board[nr][nc]) {
                        moves.push({ r: nr, c: nc });
                    }
                }
            });
        }
        return moves;
    }

    function executeMove(fromR, fromC, toR, toC, captured) {
        const piece = board[fromR][fromC];
        board[toR][toC] = piece;
        board[fromR][fromC] = null;
        if (captured) board[captured.r][captured.c] = null;

        // Dammaya çevrilmə
        if ((piece.color === 'player' && toR === 0) || (piece.color === 'bot' && toR === 7)) {
            piece.type = 'king';
        }

        // Ardıcıl vurma
        if (captured) {
            const nextMoves = getValidMoves(toR, toC, true).filter(m => m.captured);
            if (nextMoves.length > 0) {
                selectedSquare = { r: toR, c: toC };
                possibleMoves = nextMoves;
                render();
                return;
            }
        }

        turn = turn === 'player' ? 'bot' : 'player';
        selectedSquare = null;
        possibleMoves = [];
        updateStatus(turn === 'player' ? "SİZİN NÖVBƏNİZ" : "BOT DÜŞÜNÜR...");
        render();
        if (turn === 'bot') setTimeout(botTurn, 800);
    }

    function botTurn() {
        const pieces = [];
        for (let r = 0; r < 8; r++) {
            for (let c = 0; c < 8; c++) {
                if (board[r][c] && board[r][c].color === 'bot') pieces.push({ r, c });
            }
        }
        let moves = [];
        pieces.forEach(p => {
            getValidMoves(p.r, p.c).forEach(m => moves.push({ from: p, to: m }));
        });

        const captures = moves.filter(m => m.to.captured);
        const finalMoves = captures.length > 0 ? captures : moves;
        
        if (finalMoves.length > 0) {
            const m = finalMoves[Math.floor(Math.random() * finalMoves.length)];
            executeMove(m.from.r, m.from.c, m.to.r, m.to.c, m.to.captured);
        } else {
            updateStatus("OYUN BİTDİ! SİZ QAZANDINIZ!");
        }
    }

    function updateStatus(msg) { document.getElementById('status').innerText = msg; }
    initGame();
</script>
</body>
</html>
